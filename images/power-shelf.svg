<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380">
  <defs>
    <linearGradient id="rackGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a3d42"/><stop offset="100%" stop-color="#2a2d32"/>
    </linearGradient>
    <linearGradient id="psuGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#556"/><stop offset="100%" stop-color="#334"/>
    </linearGradient>
    <linearGradient id="liquidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0af"/><stop offset="100%" stop-color="#06c"/>
    </linearGradient>
    <filter id="shadow2"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter>
  </defs>

  <!-- Rack frame -->
  <rect x="40" y="20" width="480" height="340" rx="4" fill="none" stroke="#555" stroke-width="3"/>
  <rect x="43" y="23" width="474" height="334" rx="3" fill="#1a1d22"/>

  <!-- Rack ears -->
  <rect x="30" y="30" width="20" height="30" rx="2" fill="#555"/>
  <rect x="30" y="70" width="20" height="30" rx="2" fill="#555"/>
  <rect x="510" y="30" width="20" height="30" rx="2" fill="#555"/>
  <rect x="510" y="70" width="20" height="30" rx="2" fill="#555"/>

  <!-- Shelf label -->
  <text x="280" y="50" text-anchor="middle" font-size="14" font-weight="bold" fill="#0af">Power Shelf 33kW — 1U</text>
  <text x="280" y="66" text-anchor="middle" font-size="9" fill="#888">5+1 Redundant · 3-Phase 380-480V AC · 50V DC Bus · Cold Plate Liquid Cooling</text>

  <!-- PSU slots -->
  <g filter="url(#shadow2)">
    <!-- PSU 1 -->
    <rect x="55" y="90" width="72" height="190" rx="3" fill="url(#psuGrad)" stroke="#555" stroke-width="1"/>
    <rect x="62" y="100" width="58" height="12" rx="2" fill="#444"/>
    <circle cx="91" cy="180" r="20" fill="#333" stroke="#555" stroke-width="1"/>
    <circle cx="91" cy="180" r="12" fill="none" stroke="#555" stroke-width="0.5"/>
    <rect x="62" y="255" width="58" height="6" rx="1" fill="#c8a020"/>
    <text x="91" y="280" text-anchor="middle" font-size="8" fill="#0c0">5.5kW</text>
    <text x="91" y="290" text-anchor="middle" font-size="7" fill="#aaa">#1 Active</text>

    <!-- PSU 2 -->
    <rect x="135" y="90" width="72" height="190" rx="3" fill="url(#psuGrad)" stroke="#555" stroke-width="1"/>
    <rect x="142" y="100" width="58" height="12" rx="2" fill="#444"/>
    <circle cx="171" cy="180" r="20" fill="#333" stroke="#555" stroke-width="1"/>
    <circle cx="171" cy="180" r="12" fill="none" stroke="#555" stroke-width="0.5"/>
    <rect x="142" y="255" width="58" height="6" rx="1" fill="#c8a020"/>
    <text x="171" y="280" text-anchor="middle" font-size="8" fill="#0c0">5.5kW</text>
    <text x="171" y="290" text-anchor="middle" font-size="7" fill="#aaa">#2 Active</text>

    <!-- PSU 3 -->
    <rect x="215" y="90" width="72" height="190" rx="3" fill="url(#psuGrad)" stroke="#555" stroke-width="1"/>
    <rect x="222" y="100" width="58" height="12" rx="2" fill="#444"/>
    <circle cx="251" cy="180" r="20" fill="#333" stroke="#555" stroke-width="1"/>
    <rect x="222" y="255" width="58" height="6" rx="1" fill="#c8a020"/>
    <text x="251" y="280" text-anchor="middle" font-size="8" fill="#0c0">5.5kW</text>
    <text x="251" y="290" text-anchor="middle" font-size="7" fill="#aaa">#3 Active</text>

    <!-- PSU 4 -->
    <rect x="295" y="90" width="72" height="190" rx="3" fill="url(#psuGrad)" stroke="#555" stroke-width="1"/>
    <rect x="302" y="100" width="58" height="12" rx="2" fill="#444"/>
    <circle cx="331" cy="180" r="20" fill="#333" stroke="#555" stroke-width="1"/>
    <rect x="302" y="255" width="58" height="6" rx="1" fill="#c8a020"/>
    <text x="331" y="280" text-anchor="middle" font-size="8" fill="#0c0">5.5kW</text>
    <text x="331" y="290" text-anchor="middle" font-size="7" fill="#aaa">#4 Active</text>

    <!-- PSU 5 -->
    <rect x="375" y="90" width="72" height="190" rx="3" fill="url(#psuGrad)" stroke="#555" stroke-width="1"/>
    <rect x="382" y="100" width="58" height="12" rx="2" fill="#444"/>
    <circle cx="411" cy="180" r="20" fill="#333" stroke="#555" stroke-width="1"/>
    <rect x="382" y="255" width="58" height="6" rx="1" fill="#c8a020"/>
    <text x="411" y="280" text-anchor="middle" font-size="8" fill="#0c0">5.5kW</text>
    <text x="411" y="290" text-anchor="middle" font-size="7" fill="#aaa">#5 Active</text>

    <!-- PSU 6 (Standby) -->
    <rect x="455" y="90" width="72" height="190" rx="3" fill="#2a2a30" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
    <rect x="462" y="100" width="58" height="12" rx="2" fill="#333"/>
    <circle cx="491" cy="180" r="20" fill="#222" stroke="#444" stroke-width="1"/>
    <rect x="462" y="255" width="58" height="6" rx="1" fill="#8a7020"/>
    <text x="491" y="280" text-anchor="middle" font-size="8" fill="#fa0">5.5kW</text>
    <text x="491" y="290" text-anchor="middle" font-size="7" fill="#888">#6 Standby</text>
  </g>

  <!-- Liquid cooling pipes -->
  <rect x="50" y="85" width="480" height="6" rx="2" fill="url(#liquidGrad)" opacity="0.6"/>
  <rect x="50" y="287" width="480" height="6" rx="2" fill="url(#liquidGrad)" opacity="0.6"/>
  <text x="290" y="82" text-anchor="middle" font-size="7" fill="#0af">Cold Plate Inlet</text>
  <text x="290" y="302" text-anchor="middle" font-size="7" fill="#0af">Cold Plate Outlet</text>

  <!-- Output bus bar -->
  <rect x="50" y="308" width="480" height="8" rx="2" fill="#c8a020" opacity="0.8"/>
  <text x="290" y="324" text-anchor="middle" font-size="9" fill="#c8a020">50V DC Bus Bar → Server Rack</text>

  <!-- RMU indicator -->
  <rect x="440" y="20" width="80" height="20" rx="3" fill="#1a3a5c" stroke="#0af" stroke-width="1"/>
  <text x="480" y="33" text-anchor="middle" font-size="8" fill="#0af">RMU Active</text>
</svg>
