<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ecf0"/>
      <stop offset="100%" stop-color="#c8cdd3"/>
    </linearGradient>
    <linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0d5db"/>
      <stop offset="100%" stop-color="#b0b5bb"/>
    </linearGradient>
    <linearGradient id="frontGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8dce0"/>
      <stop offset="100%" stop-color="#a8acb2"/>
    </linearGradient>
    <linearGradient id="fanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#667"/>
      <stop offset="100%" stop-color="#445"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#d4a020"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Shadow base -->
  <ellipse cx="200" cy="255" rx="160" ry="18" fill="#00000020"/>

  <!-- Main body - isometric-like view -->
  <!-- Top face -->
  <polygon points="80,120 320,120 370,75 130,75" fill="url(#topGrad)" stroke="#999" stroke-width="1"/>

  <!-- Right side -->
  <polygon points="320,120 370,75 370,195 320,240" fill="url(#bodyGrad)" stroke="#999" stroke-width="1"/>

  <!-- Front face -->
  <polygon points="80,120 320,120 320,240 80,240" fill="url(#frontGrad)" stroke="#999" stroke-width="1"/>

  <!-- Fan grill on front -->
  <circle cx="200" cy="180" r="45" fill="url(#fanGrad)" stroke="#555" stroke-width="2"/>
  <circle cx="200" cy="180" r="35" fill="none" stroke="#555" stroke-width="1"/>
  <circle cx="200" cy="180" r="22" fill="none" stroke="#555" stroke-width="1"/>
  <circle cx="200" cy="180" r="8" fill="#555"/>
  <!-- Fan blades -->
  <line x1="200" y1="145" x2="200" y2="215" stroke="#555" stroke-width="1.5"/>
  <line x1="155" y1="180" x2="245" y2="180" stroke="#555" stroke-width="1.5"/>
  <line x1="168" y1="148" x2="232" y2="212" stroke="#555" stroke-width="1"/>
  <line x1="232" y1="148" x2="168" y2="212" stroke="#555" stroke-width="1"/>

  <!-- Handle on front -->
  <rect x="170" y="100" width="60" height="10" rx="3" fill="#667" stroke="#555" stroke-width="1"/>
  <rect x="175" y="108" width="10" height="14" rx="1" fill="#556" stroke="#555" stroke-width="0.5"/>
  <rect x="215" y="108" width="10" height="14" rx="1" fill="#556" stroke="#555" stroke-width="0.5"/>

  <!-- LED indicators -->
  <circle cx="130" cy="108" r="4" fill="#0c0"/>
  <circle cx="145" cy="108" r="4" fill="#0c0"/>

  <!-- Connector/golden finger area (bottom edge) -->
  <rect x="100" y="232" width="200" height="6" rx="1" fill="url(#goldGrad)" stroke="#b8901a" stroke-width="0.5"/>

  <!-- Label area -->
  <rect x="105" y="130" width="70" height="35" rx="2" fill="#fffc" stroke="#ccc" stroke-width="0.5"/>
  <text x="140" y="146" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">CRPS</text>
  <text x="140" y="159" text-anchor="middle" font-size="8" fill="#666">185×73.5×39</text>

  <!-- Dimension annotations -->
  <line x1="75" y1="240" x2="75" y2="250" stroke="#888" stroke-width="0.5"/>
  <line x1="75" y1="245" x2="325" y2="245" stroke="#888" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="325" y1="240" x2="325" y2="250" stroke="#888" stroke-width="0.5"/>
  <text x="200" y="262" text-anchor="middle" font-size="9" fill="#666">185 mm</text>
</svg>
