<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300">
  <defs>
    <linearGradient id="psuBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8dce2"/><stop offset="100%" stop-color="#b0b4ba"/>
    </linearGradient>
    <linearGradient id="psuTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0c5ca"/><stop offset="100%" stop-color="#a0a4aa"/>
    </linearGradient>
    <linearGradient id="tiBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0dcc8"/><stop offset="100%" stop-color="#c8c4a8"/>
    </linearGradient>
    <linearGradient id="tiTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8c4a8"/><stop offset="100%" stop-color="#b0ac88"/>
    </linearGradient>
  </defs>

  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">DOTOCOME CRPS Product Family</text>

  <!-- 800W -->
  <g transform="translate(10,50)">
    <polygon points="10,170 130,170 150,140 30,140" fill="url(#psuTop)" stroke="#999" stroke-width="1"/>
    <polygon points="130,170 150,140 150,205 130,235" fill="url(#psuBody)" stroke="#999" stroke-width="1"/>
    <polygon points="10,170 130,170 130,235 10,235" fill="url(#psuBody)" stroke="#999" stroke-width="1"/>
    <circle cx="70" cy="202" r="22" fill="#556" stroke="#444" stroke-width="1.5"/>
    <circle cx="70" cy="202" r="14" fill="none" stroke="#444" stroke-width="0.8"/>
    <circle cx="70" cy="202" r="5" fill="#444"/>
    <rect x="60" y="148" width="20" height="5" rx="2" fill="#667"/>
    <circle cx="25" cy="152" r="3" fill="#0c0"/>
    <rect x="15" y="227" width="110" height="5" rx="1" fill="#c8a020"/>
    <text x="70" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">CRPS-800</text>
    <text x="70" y="276" text-anchor="middle" font-size="10" fill="#888">800W Platinum</text>
  </g>

  <!-- 1600W -->
  <g transform="translate(165,50)">
    <polygon points="10,170 130,170 150,140 30,140" fill="url(#psuTop)" stroke="#999" stroke-width="1"/>
    <polygon points="130,170 150,140 150,205 130,235" fill="url(#psuBody)" stroke="#999" stroke-width="1"/>
    <polygon points="10,170 130,170 130,235 10,235" fill="url(#psuBody)" stroke="#999" stroke-width="1"/>
    <circle cx="70" cy="202" r="22" fill="#556" stroke="#444" stroke-width="1.5"/>
    <circle cx="70" cy="202" r="14" fill="none" stroke="#444" stroke-width="0.8"/>
    <circle cx="70" cy="202" r="5" fill="#444"/>
    <rect x="60" y="148" width="20" height="5" rx="2" fill="#667"/>
    <circle cx="25" cy="152" r="3" fill="#0c0"/>
    <circle cx="38" cy="152" r="3" fill="#0c0"/>
    <rect x="15" y="227" width="110" height="5" rx="1" fill="#c8a020"/>
    <text x="70" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">CRPS-1600</text>
    <text x="70" y="276" text-anchor="middle" font-size="10" fill="#888">1600W Platinum</text>
  </g>

  <!-- 2000W -->
  <g transform="translate(320,50)">
    <polygon points="10,170 130,170 150,140 30,140" fill="url(#psuTop)" stroke="#999" stroke-width="1"/>
    <polygon points="130,170 150,140 150,205 130,235" fill="url(#psuBody)" stroke="#999" stroke-width="1"/>
    <polygon points="10,170 130,170 130,235 10,235" fill="url(#psuBody)" stroke="#999" stroke-width="1"/>
    <circle cx="70" cy="202" r="22" fill="#556" stroke="#444" stroke-width="1.5"/>
    <circle cx="70" cy="202" r="14" fill="none" stroke="#444" stroke-width="0.8"/>
    <rect x="60" y="148" width="20" height="5" rx="2" fill="#667"/>
    <circle cx="25" cy="152" r="3" fill="#0c0"/>
    <circle cx="38" cy="152" r="3" fill="#0c0"/>
    <rect x="15" y="227" width="110" height="5" rx="1" fill="#c8a020"/>
    <text x="70" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">CRPS-2000</text>
    <text x="70" y="276" text-anchor="middle" font-size="10" fill="#888">2000W Titanium</text>
  </g>

  <!-- 3000W (larger) -->
  <g transform="translate(460,35)">
    <polygon points="10,185 170,185 195,150 35,150" fill="url(#psuTop)" stroke="#999" stroke-width="1.5"/>
    <polygon points="170,185 195,150 195,222 170,257" fill="url(#psuBody)" stroke="#999" stroke-width="1.5"/>
    <polygon points="10,185 170,185 170,257 10,257" fill="url(#psuBody)" stroke="#999" stroke-width="1.5"/>
    <!-- Dual fans -->
    <circle cx="60" cy="221" r="22" fill="#445" stroke="#333" stroke-width="1.5"/>
    <circle cx="120" cy="221" r="22" fill="#445" stroke="#333" stroke-width="1.5"/>
    <rect x="75" y="158" width="30" height="6" rx="2" fill="#556"/>
    <circle cx="35" cy="163" r="4" fill="#0c0"/>
    <circle cx="50" cy="163" r="4" fill="#0c0"/>
    <circle cx="65" cy="163" r="4" fill="#fa0"/>
    <rect x="15" y="249" width="150" height="6" rx="1" fill="#c8a020"/>
    <!-- "Flagship" badge -->
    <rect x="15" y="142" width="50" height="14" rx="3" fill="#00a0d2"/>
    <text x="40" y="152" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">FLAGSHIP</text>
    <text x="95" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#00a0d2">CRPS-3000</text>
    <text x="95" y="305" text-anchor="middle" font-size="10" fill="#888">3000W Platinum · 72W/in³</text>
  </g>
