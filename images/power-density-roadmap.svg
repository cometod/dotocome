<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340">
  <defs>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00d2a0"/><stop offset="100%" stop-color="#00a0d2"/></linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6c5ce7"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
  </defs>

  <rect width="720" height="340" fill="#fff" rx="8"/>
  <text x="360" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2a44">AI Data Center PSU Power Density & Efficiency Evolution (2016-2026)</text>

  <!-- Y-axis labels -->
  <text x="50" y="60" font-size="9" fill="#888">W/in³</text>
  <line x1="75" y1="40" x2="75" y2="280" stroke="#ddd" stroke-width="1"/>
  <text x="65" y="55" text-anchor="end" font-size="8" fill="#aaa">100</text><line x1="70" y1="52" x2="75" y2="52" stroke="#eee" stroke-width="0.5"/>
  <text x="65" y="95" text-anchor="end" font-size="8" fill="#aaa">80</text><line x1="70" y1="92" x2="75" y2="92" stroke="#eee" stroke-width="0.5"/>
  <text x="65" y="135" text-anchor="end" font-size="8" fill="#aaa">60</text><line x1="70" y1="132" x2="75" y2="132" stroke="#eee" stroke-width="0.5"/>
  <text x="65" y="175" text-anchor="end" font-size="8" fill="#aaa">40</text><line x1="70" y1="172" x2="75" y2="172" stroke="#eee" stroke-width="0.5"/>
  <text x="65" y="215" text-anchor="end" font-size="8" fill="#aaa">20</text><line x1="70" y1="212" x2="75" y2="212" stroke="#eee" stroke-width="0.5"/>
  <text x="65" y="270" text-anchor="end" font-size="8" fill="#aaa">0</text>

  <!-- Bar chart: Power Density -->
  <g transform="translate(85,40)">
    <text x="240" y="-5" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a2a44">Power Density (W/in³)</text>

    <!-- 2016 - 24 -->
    <rect x="12" y="232-24*2.3" width="28" height="24*2.3" rx="3" fill="#d0d5dd"/><text x="26" y="225" text-anchor="middle" font-size="7" fill="#666">24</text>
    <text x="26" y="250" text-anchor="middle" font-size="8" fill="#888">2016</text>

    <!-- 2018 - 48 -->
    <rect x="52" y="232-48*2.3" width="28" height="48*2.3" rx="3" fill="#c0c5ca"/><text x="66" y="118" text-anchor="middle" font-size="7" fill="#666">48</text>
    <text x="66" y="250" text-anchor="middle" font-size="8" fill="#888">2018</text>

    <!-- 2020 - 60 -->
    <rect x="92" y="232-60*2.3" width="28" height="60*2.3" rx="3" fill="#aaa"/><text x="106" y="90" text-anchor="middle" font-size="7" fill="#666">60</text>
    <text x="106" y="250" text-anchor="middle" font-size="8" fill="#888">2020</text>

    <!-- 2021 - 66 -->
    <rect x="132" y="232-66*2.3" width="28" height="66*2.3" rx="3" fill="#999"/><text x="146" y="77" text-anchor="middle" font-size="7" fill="#666">66</text>
    <text x="146" y="250" text-anchor="middle" font-size="8" fill="#888">2021</text>

    <!-- 2022 - 72 -->
    <rect x="172" y="232-72*2.3" width="28" height="72*2.3" rx="3" fill="#888"/><text x="186" y="63" text-anchor="middle" font-size="7" fill="#fff">72</text>
    <text x="186" y="250" text-anchor="middle" font-size="8" fill="#888">2022</text>

    <!-- 2023 - 81 -->
    <rect x="212" y="232-81*2.3" width="28" height="81*2.3" rx="3" fill="#00a0d2"/><text x="226" y="42" text-anchor="middle" font-size="7" fill="#fff">81</text>
    <text x="226" y="250" text-anchor="middle" font-size="8" fill="#00a0d2">2023</text>

    <!-- 2024 - 90 -->
    <rect x="252" y="232-90*2.3" width="28" height="90*2.3" rx="3" fill="#00a0d2"/><text x="266" y="30" text-anchor="middle" font-size="7" fill="#fff">90</text>
    <text x="266" y="250" text-anchor="middle" font-size="8" fill="#00a0d2">2024</text>

    <!-- 2025 - 96 -->
    <rect x="292" y="232-96*2.3" width="28" height="96*2.3" rx="3" fill="#6c5ce7"/><text x="306" y="17" text-anchor="middle" font-size="7" fill="#fff">96</text>
    <text x="306" y="250" text-anchor="middle" font-size="8" fill="#6c5ce7">2025</text>

    <!-- 2026 - 100 -->
    <rect x="332" y="232-100*2.3" width="40" height="100*2.3" rx="4" fill="url(#bar1)"/><text x="352" y="10" text-anchor="middle" font-size="9" font-weight="bold" fill="#0a1628">100</text>
    <text x="352" y="250" text-anchor="middle" font-size="9" font-weight="bold" fill="#00a0d2">2026</text>

    <!-- Target line -->
    <line x1="335" y1="232-100*2.3" x2="400" y2="232-100*2.3" stroke="#00d2a0" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="405" y="10" font-size="8" fill="#00d2a0" font-weight="bold">100 W/in³ Target</text>
  </g>

  <!-- Bottom: Key Milestones -->
  <g transform="translate(30,295)">
    <rect x="0" y="0" width="660" height="38" rx="6" fill="#f8fafc" stroke="#ddd" stroke-width="1"/>
    <text x="10" y="14" font-size="8" fill="#888">Key Enablers:</text>
    <circle cx="120" cy="10" r="3" fill="#e76f51"/><text x="128" y="14" font-size="8" fill="#555">SiC MOSFET (2020)</text>
    <circle cx="240" cy="10" r="3" fill="#6c5ce7"/><text x="248" y="14" font-size="8" fill="#555">TPFC Topology (2021)</text>
    <circle cx="345" cy="10" r="3" fill="#f0a020"/><text x="353" y="14" font-size="8" fill="#555">TO-LL Package (2022)</text>
    <circle cx="455" cy="10" r="3" fill="#00a0d2"/><text x="463" y="14" font-size="8" fill="#555">GaN HEMT (2023)</text>
    <circle cx="545" cy="10" r="3" fill="#00d2a0"/><text x="553" y="14" font-size="8" fill="#555">3-Phase LLC (2025+)</text>
  </g>
</svg>