<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340">
  <defs>
    <linearGradient id="nvidiaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#76b900"/><stop offset="100%" stop-color="#00d2a0"/>
    </linearGradient>
  </defs>

  <rect width="720" height="340" fill="#fff" rx="8"/>
  <text x="360" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2a44">NVIDIA GPU Platform Power Evolution & DOTOCOME PSU Matching (2022-2027)</text>

  <!-- Main timeline -->
  <line x1="60" y1="200" x2="680" y2="200" stroke="url(#nvidiaGrad)" stroke-width="4"/>

  <!-- H100 2022 -->
  <circle cx="120" cy="200" r="38" fill="#f8fafc" stroke="#76b900" stroke-width="2"/>
  <text x="120" y="188" text-anchor="middle" font-size="8" fill="#76b900">H100</text>
  <text x="120" y="202" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a2a44">700W</text>
  <text x="120" y="215" text-anchor="middle" font-size="7" fill="#888">2022</text>
  <line x1="120" y1="238" x2="120" y2="250" stroke="#888" stroke-width="1"/>
  <text x="120" y="260" text-anchor="middle" font-size="7" fill="#888">CRPS 2200W</text>

  <!-- H200 2023 -->
  <circle cx="220" cy="170" r="42" fill="#f8fafc" stroke="#8bc400" stroke-width="2"/>
  <text x="220" y="155" text-anchor="middle" font-size="8" fill="#8bc400">H200</text>
  <text x="220" y="172" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a2a44">700W</text>
  <text x="220" y="187" text-anchor="middle" font-size="7" fill="#888">2023</text>
  <line x1="220" y1="212" x2="220" y2="245" stroke="#888" stroke-width="1"/>
  <text x="220" y="258" text-anchor="middle" font-size="7" fill="#888">CRPS 3200W</text>

  <!-- B200 2024 -->
  <circle cx="320" cy="145" r="48" fill="#f8fafc" stroke="#6c5ce7" stroke-width="2.5"/>
  <text x="320" y="125" text-anchor="middle" font-size="8" fill="#6c5ce7">B200</text>
  <text x="320" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2a44">1000W</text>
  <text x="320" y="162" text-anchor="middle" font-size="7" fill="#888">2024</text>
  <line x1="320" y1="193" x2="320" y2="240" stroke="#888" stroke-width="1"/>
  <text x="320" y="253" text-anchor="middle" font-size="7" fill="#888">CRPS 3200CL</text>

  <!-- GB200 2024 -->
  <circle cx="420" cy="130" r="52" fill="#f8fafc" stroke="#e76f51" stroke-width="2.5"/>
  <text x="420" y="108" text-anchor="middle" font-size="8" fill="#e76f51">GB200 NVL72</text>
  <text x="420" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2a44">1200W/GPU</text>
  <text x="420" y="148" text-anchor="middle" font-size="7" fill="#888">2024</text>
  <line x1="420" y1="182" x2="420" y2="235" stroke="#888" stroke-width="1"/>
  <text x="420" y="248" text-anchor="middle" font-size="7" fill="#e76f51">33kW Shelf + BBU</text>

  <!-- GB300 2025 -->
  <circle cx="510" cy="110" r="56" fill="#f8fafc" stroke="#f0a020" stroke-width="3"/>
  <text x="510" y="85" text-anchor="middle" font-size="8" fill="#f0a020">GB300 Ultra</text>
  <text x="510" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2a44">1400W</text>
  <text x="510" y="128" text-anchor="middle" font-size="7" fill="#888">2025</text>
  <line x1="510" y1="166" x2="510" y2="230" stroke="#888" stroke-width="1"/>
  <text x="510" y="243" text-anchor="middle" font-size="7" fill="#f0a020">4800CL + 800V HVDC</text>

  <!-- Rubin 2026 -->
  <circle cx="595" cy="90" r="60" fill="#fafdf8" stroke="#00a0d2" stroke-width="3"/>
  <text x="595" y="63" text-anchor="middle" font-size="9" fill="#00a0d2">Rubin</text>
  <text x="595" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#00a0d2">1800W+</text>
  <text x="595" y="108" text-anchor="middle" font-size="7" fill="#888">2026</text>
  <line x1="595" y1="150" x2="595" y2="225" stroke="#888" stroke-width="1"/>
  <text x="595" y="238" text-anchor="middle" font-size="7" fill="#00a0d2">Next-Gen 5500W</text>

  <!-- Kyber 2027 -->
  <circle cx="675" cy="70" r="64" fill="#f8fafc" stroke="#6c5ce7" stroke-width="3.5" stroke-dasharray="6,3"/>
  <text x="675" y="40" text-anchor="middle" font-size="9" fill="#6c5ce7">Kyber</text>
  <text x="675" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#6c5ce7">>2000W</text>
  <text x="675" y="88" text-anchor="middle" font-size="7" fill="#888">2027+</text>
  <line x1="675" y1="134" x2="675" y2="220" stroke="#888" stroke-width="1"/>
  <text x="675" y="233" text-anchor="middle" font-size="7" fill="#6c5ce7">800V HVDC Complete</text>

  <!-- Bottom: Total Rack Power -->
  <rect x="60" y="275" width="640" height="55" rx="8" fill="#f0f7fa" stroke="#ccdde8" stroke-width="1"/>
  <text x="70" y="296" font-size="9" font-weight="bold" fill="#1a2a44">Rack Power:</text>
  <text x="150" y="296" font-size="9" fill="#666">20kW</text>
  <text x="210" y="296" font-size="9" fill="#666">25kW</text>
  <text x="270" y="296" font-size="9" fill="#666">40kW</text>
  <text x="330" y="296" font-size="9" fill="#666">60kW</text>
  <text x="390" y="296" font-size="9" fill="#e76f51" font-weight="bold">80kW</text>
  <text x="455" y="296" font-size="9" fill="#f0a020" font-weight="bold">100kW</text>
  <text x="530" y="296" font-size="10" fill="#00a0d2" font-weight="bold">120kW+</text>
  <text x="580" y="296" font-size="10" fill="#6c5ce7" font-weight="bold">150kW+</text>
  <text x="70" y="318" font-size="8" fill="#999">DOTOCOME PSU:</text>
  <text x="160" y="318" font-size="8" fill="#00a0d2">2.2-3kW</text>
  <text x="235" y="318" font-size="8" fill="#00a0d2">3.2kW</text>
  <text x="300" y="318" font-size="8" fill="#00a0d2">3.2kW CL</text>
  <text x="370" y="318" font-size="8" fill="#e76f51">33kW Shelf</text>
  <text x="450" y="318" font-size="8" fill="#f0a020">4.8kW CL</text>
  <text x="520" y="318" font-size="8" fill="#00a0d2">5.5kW</text>
  <text x="575" y="318" font-size="8" fill="#6c5ce7">6kW+</text>
</svg>